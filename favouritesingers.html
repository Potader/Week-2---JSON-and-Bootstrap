<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favourite Singers</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="js/main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container-fluid p-2 bg-success text-center">
      <h1 class="text-bg-success">Favourite Singers</h1>
    </div>
    <div class="container-fluid bg-success">
      <div class="row">
        <div class="col-sm-4">
          <img class="img-fluid pb-5" src="images/singer-silouette.jpg" />
        </div>
        <div class="col-sm-8" alt="singer">
          <table class="table table-striped">
            <thead class="table-success">
              <tr>
                <th>Name</th>
                <th>Band</th>
                <th>DOB</th>
                <th>Best Songs</th>
              </tr>
            </thead>
            <tbody id="singer-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
